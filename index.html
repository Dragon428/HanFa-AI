<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HanFa AI</title>
    <meta name="description" content="Descubre HanFa AI, la plataforma de inteligencia artificial de FacheStudios. Chatea con modelos avanzados (FacheAI V1, Gemini) y genera imágenes impresionantes en segundos.">
    <meta name="keywords" content="Inteligencia Artificial, Chatbot AI, Generador de imágenes, FacheStudios, HanFa AI, Gemini, Groq">
    <meta name="author" content="FacheStudios">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Redes Sociales -->
    <meta property="og:title" content="HanFa AI - Inteligencia Artificial Avanzada">
    <meta property="og:description" content="Chatea y genera imágenes espectaculares en un solo lugar. Desarrollado por FacheStudios.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hf.fachestudios.com/">
    <meta property="og:site_name" content="HanFa AI">
    
    <!-- URL Canónica -->
    <link rel="canonical" href="https://hf.fachestudios.com/">
    <link rel="icon" href="logo.svg?v=4" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="app-layout">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <!-- Logo -->
            <div class="sb-logo">
                <div class="sb-logo-icon"><img src="logo.svg?v=4" alt="HanFa AI"></div>
                <div class="sb-logo-text">
                    <h1 class="sb-logo-name" style="margin:0;">HanFa AI</h1>
                    <span class="sb-logo-by">by FacheStudios</span>
                </div>
            </div>

            <!-- New Chat -->
            <button class="sb-btn sb-new" id="btn-new">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span data-i18n="btn_new">Nueva conversación</span>
            </button>

            <!-- Section nav -->
            <div class="sb-section-label" data-i18n="sb_sections">SECCIONES</div>
            <nav class="sb-nav">
                <button class="sb-nav-btn active" data-section="chat">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span data-i18n="nav_chat">Chat AI</span>
                </button>
                <button class="sb-nav-btn" data-section="images">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span data-i18n="nav_images">Imágenes</span>
                </button>
            </nav>

            <!-- Models -->
            <div class="sb-section-label" data-i18n="sb_models">MODELOS</div>
            <div class="sb-models">
                    <button class="sb-model active" data-model="groq">
                        <div class="sb-model-icon" style="background:transparent;">
                            <svg viewBox="-5 -5 110 110" width="100%" height="100%" fill="none" stroke="#8c9096" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><path d="M 80 100 L 90 100 A 10 10 0 0 0 100 90 L 100 10 A 10 10 0 0 0 90 0 L 10 0 A 10 10 0 0 0 0 10 L 0 90 A 10 10 0 0 0 10 100 L 75 100 A 10 10 0 0 0 85 90 L 85 25 A 10 10 0 0 0 75 15 L 25 15 A 10 10 0 0 0 15 25 L 15 75 A 10 10 0 0 0 25 85 L 60 85" /><text x="50" y="65" font-family="Arial, sans-serif" font-weight="900" font-size="38" fill="#8c9096" stroke="none" text-anchor="middle">FA</text></svg>
                        </div>
                        <div class="sb-model-info">
                            <span class="sb-model-name">FacheAI</span>
                            <span class="sb-model-sub" data-i18n="model_fache_sub">V1</span>
                        </div>
                    </button>
                    <button class="sb-model" data-model="gemini">
                        <div class="sb-model-icon" style="background:transparent;">
                            <svg viewBox="0 0 24 24" width="100%" height="100%"><defs><linearGradient id="gGrad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ea4335" /><stop offset="50%" stop-color="#4285f4" /><stop offset="100%" stop-color="#34a853" /></linearGradient></defs><path d="M12 0 C 12 10 14 12 24 12 C 14 12 12 14 12 24 C 12 14 10 12 0 12 C 10 12 12 10 12 0 Z" fill="url(#gGrad2)"/></svg>
                        </div>
                    <div class="sb-model-info">
                        <span class="sb-model-name">Gemini 2.5</span>
                        <span class="sb-model-sub">Pro/Flash</span>
                    </div>
                </button>
            </div>

            <!-- Spacer -->
            <div class="sb-spacer"></div>

            <!-- Bottom: Language -->
            <button class="sb-btn sb-lang" id="lang-toggle">
                <span class="lang-flag" id="lang-flag">🇪🇸</span>
                <span data-i18n="lang_label">Español</span>
                <span class="lang-code" id="lang-code">ES</span>
            </button>
        </aside>

        <!-- Mobile topbar -->
        <div class="mobile-bar" id="mobile-bar">
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div style="display:flex;align-items:center;gap:8px;flex:1;">
                <img src="logo.svg?v=4" alt="Logo" style="width:26px;height:26px;border-radius:6px;object-fit:cover;">
                <span class="mobile-title" style="flex:none;">HanFa AI</span>
            </div>
            <span id="model-label">FacheAI</span>
        </div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="content">
            <!-- CHAT -->
            <section class="panel active" id="panel-chat">
                <div class="chat-layout">
                    <div class="messages" id="messages">
                        <div class="welcome" id="welcome">
                            <div class="w-pill">HanFa AI</div>
                            <h2 data-i18n="welcome_title">¿En qué puedo ayudarte?</h2>
                            <p>FacheAI</p>
                        </div>
                    </div>
                    <div class="input-dock">
                        <div class="input-box">
                            <textarea id="chat-input" rows="1" data-i18n-placeholder="input_placeholder" placeholder="Escribe tu mensaje..."></textarea>
                            <button class="btn-send" id="btn-send">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9Z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- IMAGES -->
            <section class="panel" id="panel-images">
                <div class="img-layout">
                    <div class="img-head">
                        <h2 data-i18n="img_title">Generador de Imágenes</h2>
                        <p data-i18n="img_sub">Describe lo que quieres y genera imágenes con IA</p>
                    </div>
                    <div class="img-form">
                        <textarea id="img-prompt" rows="2" data-i18n-placeholder="img_placeholder" placeholder="Describe la imagen... (mejor en inglés)"></textarea>
                        <div class="img-opts">
                            <button class="btn-gen" id="btn-gen">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                                <span data-i18n="btn_gen">Generar</span>
                            </button>
                        </div>
                    </div>
                    <div class="gallery" id="gallery">
                        <div class="gallery-empty">
                            <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1" opacity=".2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <span data-i18n="gallery_empty">Las imágenes aparecerán aquí</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>


    <script src="script.js"></script>
</body>
</html>
